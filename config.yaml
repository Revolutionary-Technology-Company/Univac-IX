system:
  identity: "UNIVAC-UNIVERSAL-EMULATOR-NODE-01"
  default_word_size: 36
  total_legacy_ports: 55

nodes:
  # Examples of the 55 ports mapping to serial streams
  - id: "PORT_01"
    name: "NTDS_Parallel_Type_A_Ch1"
    type: "LEGACY_CONVERTED_SERIAL"
    port: "/dev/ttyUSB0"
    hex_address: "0x0001"
    target_module: "aegis-bridge"
    status: "ACTIVE"

  - id: "PORT_24"
    name: "Univac_36Bit_Word_Ch24"
    type: "LEGACY_CONVERTED_SERIAL"
    port: "/dev/ttyUSB23"
    hex_address: "0x0018"
    target_module: "otis-gen360"
    status: "ACTIVE"

  - id: "PORT_55"
    name: "NTDS_Serial_Type_E_Ch55"
    type: "LEGACY_CONVERTED_SERIAL"
    port: "/dev/ttyUSB54"
    hex_address: "0x0037"
    target_module: "safety-monitor"
    status: "ACTIVE"

  # High-speed Fiber Optic aggregation trunk line
  - id: "FIBER_TRUNK_01"
    name: "High_Speed_Fiber_Optic_Bus"
    type: "FIBER_OPTIC"
    port: "sfp_eth0"
    hex_address: "0x00FF"
    target_module: "aegis-bridge"
    status: "ACTIVE"
