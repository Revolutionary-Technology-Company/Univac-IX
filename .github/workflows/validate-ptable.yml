name: Validate Master P-Table Formulas

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-excel-graph:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install SheetJS and HyperFormula
      run: |
        npm install hyperformula xlsx

    - name: Execute Light Engine Formula Compilation & Export
      run: node scripts/validate_formulas.js

    - name: Archive and Export JSON Data Artifact
      uses: actions/upload-artifact@v4
      with:
        name: univac-compiled-ptable-json  # The zip file name on the GitHub Actions panel
        path: assets/data/compiled_ptable_metadata.json
        retention-days: 30                  # Automatically cleans up storage after 30 days
